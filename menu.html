<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieHub - Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">🍜 FoodieHub</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="cart.html">Cart <span id="cartCount">0</span></a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" onclick="toggleMenu()">☰</div>
        </div>
    </nav>

    <!-- ===== PAGE HEADER ===== -->
    <div class="page-header">
        <div class="container">
            <h1>Our <span>Menu</span></h1>
            <p>Choose your favorite dish</p>
        </div>
    </div>

    <!-- ===== FILTERS ===== -->
    <section class="filters">
        <div class="container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pizza">🍕 Pizza</button>
            <button class="filter-btn" data-filter="burger">🍔 Burger</button>
            <button class="filter-btn" data-filter="dessert">🍫 Dessert</button>
        </div>
    </section>

    <!-- ===== PRODUCTS ===== -->
    <section class="products">
        <div class="container">
            <div class="products-grid" id="menuProducts"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 FoodieHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
